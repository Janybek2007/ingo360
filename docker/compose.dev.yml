services:
  back:
    image: ingo360-backend:dev
    container_name: ingo360_back
    expose:
      - "8000"
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    env_file:
      - ../backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 40s

  db:
    image: postgres:15-alpine
    container_name: ingo360_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres} -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: ingo360_redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  celery_worker:
    image: ingo360-backend:dev
    container_name: ingo360_celery_worker
    command: celery -A src.celery_app worker --loglevel=info --concurrency=4 --prefetch-multiplier=1
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    env_file:
      - ../backend/.env

  frontend:
    image: ingo360-frontend:dev
    container_name: ingo360_frontend
    expose:
      - "4000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ingo360_nginx
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      back:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres:
  redis:
